project:
  type: website
  output-dir: ../_output
  resources:
    - "assets/*.pdf"
    - "assets/*.png"

website:
  title: "Quantum Information"
  navbar:
    left:
      - text: "ホーム"
        href: index.qmd
    right:
      - text: "サポート"
        href: support/index.qmd
    search: true
    sidebar:
      style: "docked"
      search: true
      collapse-level: 4
      contents:
        - section: "量子情報"
          contents:
            - index.qmd
            - section: "教科書解説 (Textbook)"
              contents:
                - text: "Textbook Theory (All Chapters)"
                  href: textbook.qmd
        - section: "サポート (Support)"
          contents:
            - support/index.qmd
            - text: "Quarto機能ショーケース"
              href: templates/quarto_feature_showcase.qmd
            - text: "教科書テンプレート"
              href: templates/quantum_textbook_template.qmd

  page-navigation: true

  page-footer:
    left: "© 2025 Quantum Information Study Project"
    right:
      - text: "ホーム"
        href: index.qmd

lang: ja

format:
  html:
    theme: cosmo
    css: templates/styles.css
    toc: true
    toc-depth: 3
    toc-location: left
    code-fold: true
    code-tools: true
    code-copy: true
    link-external-newwindow: true
    smooth-scroll: true
    anchor-sections: true
    fig-cap-location: bottom
    tbl-cap-location: top

execute:
  freeze: auto
