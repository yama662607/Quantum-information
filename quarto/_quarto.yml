project:
  type: book
  output-dir: _output
  resources:
    - "assets/*.pdf"
    - "assets/*.png"
  preview:
    watch-inputs: true

book:
  title: "Quantum Information"
  author: "Daisuke Yamashiki"
  date: "2025-01-23"
  navbar:
    left:
      - text: "ホーム"
        href: index.qmd
    right:
      - text: "サポート"
        href: support/index.qmd
  sidebar:
    style: "docked"
    search: true
    collapse-level: 4
  chapters:
    - index.qmd
    - part: "Quarto Notebook"
      chapters:
        - textbook/chapter1.qmd
        - textbook/chapter2.qmd
        - textbook/chapter3.qmd
    - support/index.qmd
    # Note: Template files (templates/*.qmd) are excluded from build
    # They are reference documents for creating new content

  page-navigation: true

  page-footer:
    left: "© 2025 Quantum Information Study Project"
    right:
      - text: "ホーム"
        href: index.qmd

number-sections: true
number-depth: 3
crossref:
  chapters: true

lang: ja

format:
  html:
    theme: cosmo
    css: templates/styles.css
    toc: true
    toc-depth: 3
    toc-location: right
    code-fold: true
    code-tools: true
    code-copy: true
    link-external-newwindow: true
    smooth-scroll: true
    anchor-sections: true
    fig-cap-location: bottom
    tbl-cap-location: top
    grid:
      body-width: 1000px
      margin-width: 250px
      sidebar-width: 300px
      gutter-width: 1.5rem
    html-math-method: katex
  pdf:
    include-in-header: preamble.tex
    pdf-engine: xelatex

execute:
  freeze: auto
