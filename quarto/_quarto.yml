project:
  type: book
  output-dir: _output
  resources:
    - "assets/*.pdf"
    - "assets/*.png"
  preview:
    watch-inputs: true

book:
  title: "Quantum Information"
  author: "Daisuke Yamashiki"
  date: "2025-01-23"
  navbar:
    left:
      - text: "ホーム"
        href: index.qmd
    right:
      - text: "サポート"
        href: support/index.qmd
  sidebar:
    style: "docked"
    search: true
    collapse-level: 4
  chapters:
    - index.qmd
    - part: "教科書解説 (Textbook)"
      chapters:
        - textbook/index.qmd
        - textbook/chapter1.qmd
        - textbook/chapter2.qmd
        - textbook/chapter3.qmd
    - part: "サポート (Support)"
      chapters:
        - support/index.qmd
        - templates/quarto_feature_showcase.qmd
        - templates/quantum_textbook_template.qmd

  page-navigation: true

  page-footer:
    left: "© 2025 Quantum Information Study Project"
    right:
      - text: "ホーム"
        href: index.qmd

lang: ja

format:
  html:
    theme: cosmo
    css: templates/styles.css
    toc: true
    toc-depth: 3
    toc-location: right
    code-fold: true
    code-tools: true
    code-copy: true
    link-external-newwindow: true
    smooth-scroll: true
    anchor-sections: true
    fig-cap-location: bottom
    tbl-cap-location: top
    grid:
      body-width: 1000px
      margin-width: 250px
      sidebar-width: 300px
      gutter-width: 1.5rem

execute:
  freeze: auto
