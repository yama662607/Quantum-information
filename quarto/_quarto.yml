project:
  type: book
  output-dir: _output
  resources:
    - "assets/pdf/**/*.pdf"
    - "assets/*.png"
  preview:
    watch-inputs: true

book:
  title: "Quantum Information"
  author: "Daisuke Yamashiki"
  date: "2025-01-23"
  navbar:
    left:
      - text: "ホーム"
        href: index.qmd
    right:
      - text: "Qiskit 実装"
        href: qiskit/index.qmd
      - text: "サポート"
        href: support/index.qmd
  sidebar:
    style: "docked"
    search: true
    collapse-level: 4
  chapters:
    - index.qmd
    - part: "Preskill 教授 講義ノート"
      chapters:
        - textbook-preskill/textbook.qmd
    - part: "Watrous 教授 (アーカイブ)"
      chapters:
        - textbook-watrous/textbook.qmd
    - part: "Qiskit 実装ノート"
      chapters:
        - qiskit/index.qmd
    - support/index.qmd
    # Note: Template files (templates/*.qmd) are excluded from build
    # They are reference documents for creating new content

  page-navigation: true

  page-footer:
    left: "© 2025 Quantum Information Study Project"
    right:
      - text: "ホーム"
        href: index.qmd

number-sections: false
crossref:
  chapters: true
  sec-prefix: "節"
  fig-prefix: "図"
  tbl-prefix: "表"
  eq-prefix: "式"

lang: ja

format:
  html:
    theme: cosmo
    css: templates/styles.css
    include-after-body: templates/sidebar-toggle.html
    toc: true
    toc-depth: 3
    toc-location: right
    code-fold: true
    code-tools: true
    code-copy: true
    link-external-newwindow: true
    smooth-scroll: true
    anchor-sections: true
    fig-cap-location: bottom
    tbl-cap-location: top
    grid:
      body-width: 1100px
      margin-width: 250px
      sidebar-width: 200px
      gutter-width: 1.5rem
    html-math-method: katex
  pdf:
    include-in-header: preamble.tex
    pdf-engine: xelatex
    top-level-division: chapter
    number-sections: true
    number-depth: 2

execute:
  freeze: auto
